
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes & Lists</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📝 Notes & Lists</h1>

  <div class="tabs">
    <button class="tab active" onclick="showTab('notes')">Notes</button>
    <button class="tab" onclick="showTab('lists')">Lists</button>
  </div>

  <!-- NOTES SECTION -->
  <div id="notes" class="section">
    <input type="text" id="note-title" placeholder="Note title..." />
    <textarea id="note-body" placeholder="Write your note..."></textarea>
    <button onclick="addNote()">Add Note</button>
    <div id="notes-container"></div>
  </div>

  <!-- LISTS SECTION -->
  <div id="lists" class="section hidden">
    <input type="text" id="list-item" placeholder="Add a list item..." />
    <button onclick="addListItem()">Add Item</button>
    <div id="lists-container"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
